<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="s3-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0d3d"/>
      <stop offset="50%" stop-color="#3d1a5c"/>
      <stop offset="100%" stop-color="#6b2d7a"/>
    </linearGradient>
    <linearGradient id="s3-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1850"/>
      <stop offset="100%" stop-color="#1a0d30"/>
    </linearGradient>
    <linearGradient id="s3-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2850"/>
      <stop offset="100%" stop-color="#1a0f28"/>
    </linearGradient>
    <radialGradient id="s3-lampGlow">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s3-neonGlow">
      <stop offset="0%" stop-color="#ff4fc8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff4fc8" stop-opacity="0"/>
    </radialGradient>

    <symbol id="s3-skyline" viewBox="0 0 1200 200" width="1200" height="200">
      <g fill="#2a1a4a" opacity="0.85">
        <rect x="0" y="60" width="80" height="140"/>
        <rect x="80" y="40" width="60" height="160"/>
        <rect x="140" y="70" width="90" height="130"/>
        <rect x="230" y="30" width="70" height="170"/>
        <rect x="300" y="55" width="100" height="145"/>
        <rect x="400" y="20" width="55" height="180"/>
        <rect x="455" y="50" width="85" height="150"/>
        <rect x="540" y="35" width="70" height="165"/>
        <rect x="610" y="65" width="95" height="135"/>
        <rect x="705" y="25" width="60" height="175"/>
        <rect x="765" y="45" width="80" height="155"/>
        <rect x="845" y="60" width="75" height="140"/>
        <rect x="920" y="30" width="90" height="170"/>
        <rect x="1010" y="50" width="65" height="150"/>
        <rect x="1075" y="40" width="80" height="160"/>
      </g>
      <g fill="#3d2560">
        <rect x="20" y="90" width="70" height="110"/>
        <rect x="110" y="75" width="90" height="125"/>
        <rect x="210" y="95" width="60" height="105"/>
        <rect x="290" y="70" width="85" height="130"/>
        <rect x="390" y="85" width="75" height="115"/>
        <rect x="480" y="60" width="95" height="140"/>
        <rect x="590" y="90" width="70" height="110"/>
        <rect x="680" y="75" width="80" height="125"/>
        <rect x="780" y="95" width="65" height="105"/>
        <rect x="860" y="70" width="90" height="130"/>
        <rect x="970" y="85" width="75" height="115"/>
        <rect x="1060" y="60" width="85" height="140"/>
      </g>
      <g fill="#ffb84d" opacity="0.75">
        <rect x="30" y="100" width="4" height="6"/><rect x="40" y="100" width="4" height="6"/>
        <rect x="120" y="90" width="5" height="7"/><rect x="135" y="90" width="5" height="7"/>
        <rect x="220" y="105" width="4" height="6"/><rect x="232" y="105" width="4" height="6"/>
        <rect x="300" y="85" width="5" height="7"/><rect x="330" y="85" width="5" height="7"/>
        <rect x="400" y="95" width="4" height="6"/><rect x="410" y="95" width="4" height="6"/>
        <rect x="490" y="75" width="5" height="7"/><rect x="520" y="75" width="5" height="7"/>
        <rect x="600" y="105" width="4" height="6"/><rect x="615" y="105" width="4" height="6"/>
        <rect x="690" y="90" width="5" height="7"/><rect x="720" y="90" width="5" height="7"/>
        <rect x="790" y="108" width="4" height="6"/><rect x="802" y="108" width="4" height="6"/>
        <rect x="870" y="85" width="5" height="7"/><rect x="900" y="85" width="5" height="7"/>
        <rect x="980" y="100" width="4" height="6"/><rect x="992" y="100" width="4" height="6"/>
        <rect x="1070" y="75" width="5" height="7"/><rect x="1100" y="75" width="5" height="7"/>
      </g>
    </symbol>

    <symbol id="s3-fence" viewBox="0 0 200 60" width="200" height="60">
      <rect x="0" y="0" width="200" height="4" fill="#0d0620"/>
      <rect x="0" y="52" width="200" height="8" fill="#0d0620"/>
      <g fill="#1a0f30">
        <rect x="8" y="4" width="3" height="48"/>
        <rect x="28" y="4" width="3" height="48"/>
        <rect x="48" y="4" width="3" height="48"/>
        <rect x="68" y="4" width="3" height="48"/>
        <rect x="88" y="4" width="3" height="48"/>
        <rect x="108" y="4" width="3" height="48"/>
        <rect x="128" y="4" width="3" height="48"/>
        <rect x="148" y="4" width="3" height="48"/>
        <rect x="168" y="4" width="3" height="48"/>
        <rect x="188" y="4" width="3" height="48"/>
      </g>
    </symbol>

    <symbol id="s3-ground" viewBox="0 0 300 130" width="300" height="130">
      <rect x="0" y="0" width="300" height="130" fill="url(#s3-ground)"/>
      <g stroke="#0d0620" stroke-width="1.5" opacity="0.7">
        <line x1="0" y1="40" x2="300" y2="40"/>
        <line x1="0" y1="85" x2="300" y2="85"/>
        <line x1="50" y1="0" x2="50" y2="40"/>
        <line x1="150" y1="0" x2="150" y2="40"/>
        <line x1="250" y1="0" x2="250" y2="40"/>
        <line x1="100" y1="40" x2="100" y2="85"/>
        <line x1="200" y1="40" x2="200" y2="85"/>
        <line x1="60" y1="85" x2="60" y2="130"/>
        <line x1="180" y1="85" x2="180" y2="130"/>
      </g>
    </symbol>

    <symbol id="s3-water" viewBox="0 0 400 50" width="400" height="50">
      <rect x="0" y="0" width="400" height="50" fill="url(#s3-water)"/>
      <g stroke="#8a5fb0" stroke-width="1" opacity="0.4" fill="none">
        <path d="M0 10 Q 25 8, 50 10 T 100 10 T 150 10 T 200 10 T 250 10 T 300 10 T 350 10 T 400 10"/>
        <path d="M0 22 Q 30 20, 60 22 T 120 22 T 180 22 T 240 22 T 300 22 T 360 22 T 400 22"/>
        <path d="M0 35 Q 20 33, 40 35 T 80 35 T 120 35 T 160 35 T 200 35 T 240 35 T 280 35 T 320 35 T 360 35 T 400 35"/>
      </g>
    </symbol>

    <symbol id="s3-lamp" viewBox="0 0 60 340" width="60" height="340">
      <circle cx="30" cy="50" r="55" fill="url(#s3-lampGlow)"/>
      <rect x="28" y="70" width="4" height="240" fill="#0d0620"/>
      <path d="M 18 70 L 42 70 L 38 48 L 22 48 Z" fill="#1a0f30"/>
      <rect x="22" y="48" width="16" height="18" fill="#ffd770"/>
      <circle cx="30" cy="57" r="4" fill="#fff5c8"/>
    </symbol>

    <symbol id="s3-tree" viewBox="0 0 180 260" width="180" height="260">
      <rect x="85" y="180" width="10" height="80" fill="#2a1530"/>
      <g fill="#6b2d8a">
        <circle cx="90" cy="80" r="55"/>
        <circle cx="55" cy="110" r="48"/>
        <circle cx="125" cy="105" r="50"/>
        <circle cx="70" cy="150" r="42"/>
        <circle cx="115" cy="155" r="45"/>
        <circle cx="90" cy="175" r="38"/>
      </g>
    </symbol>

    <symbol id="s3-cafe" viewBox="0 0 340 500" width="340" height="500">
      <circle cx="240" cy="100" r="80" fill="url(#s3-neonGlow)"/>
      <rect x="20" y="0" width="300" height="500" fill="#2d1848"/>
      <rect x="40" y="20" width="80" height="60" fill="#ffd770"/>
      <path d="M 20 160 L 320 160 L 310 200 L 30 200 Z" fill="#5a1a50"/>
      <rect x="180" y="60" width="140" height="80" fill="#1a0820" stroke="#ff4fc8" stroke-width="2"/>
      <text x="250" y="115" text-anchor="middle" font-family="Arial" font-size="48" font-weight="bold" fill="#ff4fc8">CAFE</text>
      <rect x="40" y="220" width="260" height="180" fill="#1a0820" stroke="#0d0620" stroke-width="2"/>
      <g transform="translate(110, 270)" stroke="#ff4fc8" stroke-width="3" fill="none">
        <path d="M 10 20 Q 10 60, 50 60 Q 90 60, 90 20 Z"/>
        <path d="M 90 25 Q 110 25, 110 40 Q 110 55, 90 55"/>
      </g>
      <rect x="40" y="400" width="90" height="100" fill="#1a0820"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1200" height="600" fill="url(#s3-sky)"/>

  <g fill="#fff5c8">
    <circle cx="150" cy="60" r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="40" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="80" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="30" r="1.5"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="70" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="50" r="1.3"><animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="90" r="1"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="30" r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="120" r="1"><animate attributeName="opacity" values="1;0.4;1" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="370" cy="140" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="490" cy="110" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="770" cy="120" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/></circle>
  </g>

  <g transform="translate(800, 100)">
    <circle cx="0" cy="0" r="38" fill="#fff5c8" opacity="0.2"/>
    <circle cx="0" cy="0" r="30" fill="#fff5c8"/>
    <circle cx="8" cy="-4" r="28" fill="#3d1a5c"/>
  </g>

  <g>
    <use href="#s3-skyline" x="0" y="220"/>
    <use href="#s3-skyline" x="1200" y="220"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-1200 0" dur="120s" repeatCount="indefinite"/>
  </g>
  <g>
    <use href="#s3-water" x="0" y="420"/>
    <use href="#s3-water" x="400" y="420"/>
    <use href="#s3-water" x="800" y="420"/>
    <use href="#s3-water" x="1200" y="420"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-400 0" dur="36s" repeatCount="indefinite"/>
  </g>
  <g>
    <use href="#s3-fence" x="0" y="415"/>
    <use href="#s3-fence" x="200" y="415"/>
    <use href="#s3-fence" x="400" y="415"/>
    <use href="#s3-fence" x="600" y="415"/>
    <use href="#s3-fence" x="800" y="415"/>
    <use href="#s3-fence" x="1000" y="415"/>
    <use href="#s3-fence" x="1200" y="415"/>
    <use href="#s3-fence" x="1400" y="415"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-200 0" dur="12s" repeatCount="indefinite"/>
  </g>
  <g>
    <g>
      <use href="#s3-tree" x="-40" y="210"/>
      <use href="#s3-lamp" x="140" y="130"/>
      <use href="#s3-lamp" x="560" y="130"/>
      <use href="#s3-tree" x="820" y="210"/>
      <use href="#s3-lamp" x="1050" y="130"/>
      <use href="#s3-cafe" x="1280" y="60"/>
      <use href="#s3-lamp" x="1880" y="130"/>
      <use href="#s3-tree" x="2100" y="210"/>
      <use href="#s3-tree" x="2360" y="210"/>
      <use href="#s3-lamp" x="2540" y="130"/>
      <use href="#s3-lamp" x="2960" y="130"/>
      <use href="#s3-tree" x="3220" y="210"/>
      <use href="#s3-cafe" x="3680" y="60"/>
      <use href="#s3-lamp" x="4280" y="130"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-2400 0" dur="60s" repeatCount="indefinite"/>
    </g>
  </g>
  <g>
    <use href="#s3-ground" x="0" y="470"/>
    <use href="#s3-ground" x="300" y="470"/>
    <use href="#s3-ground" x="600" y="470"/>
    <use href="#s3-ground" x="900" y="470"/>
    <use href="#s3-ground" x="1200" y="470"/>
    <use href="#s3-ground" x="1500" y="470"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-300 0" dur="8s" repeatCount="indefinite"/>
  </g>
  <rect x="0" y="468" width="1200" height="3" fill="#0d0620"/>
</svg>
