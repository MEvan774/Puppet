  <rect x="0" y="0" width="1200" height="600" fill="url(#s1-sky)"/>
  <g transform="translate(300, 120)">
    <circle cx="0" cy="0" r="60" fill="#fff5e8" opacity="0.4"/>
    <circle cx="0" cy="0" r="40" fill="#fff8ea" opacity="0.8"/>
  </g>

  <g>
    <use href="#s1-mtnTile" x="0" y="200"/>
    <use href="#s1-mtnTile" x="1200" y="200"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-1200 0" dur="200s" repeatCount="indefinite"/>
  </g>
  <g>
    <use href="#s1-mtnCTile" x="0" y="260"/>
    <use href="#s1-mtnCTile" x="1200" y="260"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-1200 0" dur="120s" repeatCount="indefinite"/>
  </g>
  <g>
    <g>
      <use href="#s1-pagoda" x="200" y="240"/>
      <use href="#s1-pagoda" x="1600" y="240"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-1800 0" dur="90s" repeatCount="indefinite"/>
    </g>
  </g>
  <g>
    <use href="#s1-riverTile" x="0" y="410"/>
    <use href="#s1-riverTile" x="400" y="410"/>
    <use href="#s1-riverTile" x="800" y="410"/>
    <use href="#s1-riverTile" x="1200" y="410"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-400 0" dur="35s" repeatCount="indefinite"/>
  </g>
  <g>
    <use href="#s1-grassTile" x="0" y="470"/>
    <use href="#s1-grassTile" x="300" y="470"/>
    <use href="#s1-grassTile" x="600" y="470"/>
    <use href="#s1-grassTile" x="900" y="470"/>
    <use href="#s1-grassTile" x="1200" y="470"/>
    <use href="#s1-grassTile" x="1500" y="470"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-300 0" dur="16s" repeatCount="indefinite"/>
  </g>
  <g>
    <g>
      <use href="#s1-sakura" x="-80" y="180"/>
      <use href="#s1-lantern" x="250" y="380"/>
      <use href="#s1-torii" x="550" y="260"/>
      <use href="#s1-sakura" x="850" y="200"/>
      <use href="#s1-lantern" x="1280" y="380"/>
      <use href="#s1-sakura" x="1450" y="180"/>
      <use href="#s1-torii" x="1900" y="260"/>
      <use href="#s1-sakura" x="2200" y="200"/>
      <use href="#s1-sakura" x="2320" y="180"/>
      <use href="#s1-lantern" x="2650" y="380"/>
      <use href="#s1-torii" x="2950" y="260"/>
      <use href="#s1-sakura" x="3250" y="200"/>
      <use href="#s1-lantern" x="3680" y="380"/>
      <use href="#s1-sakura" x="3850" y="180"/>
      <use href="#s1-torii" x="4300" y="260"/>
      <use href="#s1-sakura" x="4600" y="200"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-2400 0" dur="60s" repeatCount="indefinite"/>
    </g>
  </g>
  <g>
    <use href="#s1-pathTile" x="0" y="510"/>
    <use href="#s1-pathTile" x="300" y="510"/>
    <use href="#s1-pathTile" x="600" y="510"/>
    <use href="#s1-pathTile" x="900" y="510"/>
    <use href="#s1-pathTile" x="1200" y="510"/>
    <use href="#s1-pathTile" x="1500" y="510"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-300 0" dur="8s" repeatCount="indefinite"/>
  </g>

  <g>
    <ellipse cx="100" cy="-20" rx="4" ry="2" fill="#ffb8d8" opacity="0.9">
      <animate attributeName="cy" values="-20;620" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="100;50;100" dur="18s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="300" cy="-40" rx="3.5" ry="1.8" fill="#ffd4e5" opacity="0.85">
      <animate attributeName="cy" values="-40;640" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="300;260;300" dur="22s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="500" cy="-30" rx="4" ry="2" fill="#ff9fc8" opacity="0.9">
      <animate attributeName="cy" values="-30;630" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="500;460;500" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="700" cy="-50" rx="3" ry="1.5" fill="#ffb8d8" opacity="0.8">
      <animate attributeName="cy" values="-50;620" dur="24s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="700;650;700" dur="24s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="900" cy="-25" rx="4" ry="2" fill="#ffd4e5" opacity="0.9">
      <animate attributeName="cy" values="-25;625" dur="19s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="900;860;900" dur="19s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1100" cy="-45" rx="3.5" ry="1.8" fill="#ff9fc8" opacity="0.85">
      <animate attributeName="cy" values="-45;635" dur="21s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="1100;1050;1100" dur="21s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>
